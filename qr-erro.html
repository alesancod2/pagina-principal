<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Inválido - Auto Vale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#050A14 0%,#08101F 35%,#0D1728 100%); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .container { max-width:440px; width:100%; }
        .card { background:rgba(20,32,55,0.85); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:40px 32px; text-align:center; }
        .error-icon { width:80px; height:80px; border-radius:50%; background:rgba(220,53,69,0.12); display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
        .error-icon svg { width:40px; height:40px; color:#DC3545; }
        .title { font-size:1.5rem; font-weight:800; margin-bottom:8px; color:#fff; }
        .message { font-size:0.95rem; color:#A8B4CC; margin-bottom:32px; line-height:1.6; }
        .btn-retry { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; border-radius:12px; background:linear-gradient(135deg,#2F3EBF,#00A651); color:#fff; font-size:0.9rem; font-weight:600; text-decoration:none; transition:all 250ms ease; }
        .btn-retry:hover { opacity:0.9; transform:translateY(-2px); }
        .footer { margin-top:32px; }
        .footer-text { font-size:0.75rem; color:#5A6475; }
        .footer-brand { font-size:0.8rem; font-weight:700; color:#2F3EBF; margin-top:8px; }
        .error-code { font-size:0.75rem; color:#5A6475; margin-top:16px; font-family:monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h1 class="title">QR Code Inválido</h1>
            <p class="message">Este QR Code expirou ou não é válido.<br>Abra novamente pelo aplicativo Auto Vale.</p>
            <a href="/" class="btn-retry">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                Tentar novamente
            </a>
            <div class="footer">
                <p class="footer-text">Se o problema persistir, entre em contato com o suporte.</p>
                <p class="footer-brand">Auto Vale Prevenções</p>
            </div>
            <p class="error-code">ERR_QR_INVALID | Token: --------</p>
        </div>
    </div>
</body>
</html>
