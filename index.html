<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clube de Benefícios Auto Vale Prevenções - Marketplace">
    <meta name="theme-color" content="#2F3EBF">
    <title>Clube de Benefícios - Auto Vale Prevenções</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <img src="assets/Logomarca.png" alt="Auto Vale Prevenções" class="navbar-logo">
                <span class="navbar-divider"></span>
                <span class="navbar-title">Clube de Benefícios</span>
            </div>
            <nav class="navbar-menu">
                <a href="#" class="nav-link active">Marketplace</a>
                <a href="#" class="nav-link">Meus Pontos</a>
                <a href="#" class="nav-link">Cupons</a>
                <a href="#" class="nav-link">Histórico</a>
            </nav>
            <div class="navbar-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <div class="user-menu">
                    <div class="user-avatar">JC</div>
                    <div class="user-info">
                        <span class="user-name">João Carlos</span>
                        <span class="user-points">1.250 pts</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-text">
                    <h1 class="hero-title">Encontre benefícios <span class="text-gradient">exclusivos</span></h1>
                    <p class="hero-subtitle">Descubra parceiros com descontos incríveis na sua região</p>
                </div>
                <div class="search-bar">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" placeholder="Buscar parceiros, categorias ou benefícios...">
                    <button class="search-btn">Buscar</button>
                </div>
                <!-- Stats -->
                <div class="hero-stats">
                    <div class="stat-item">
                        <span class="stat-value">127</span>
                        <span class="stat-label">Parceiros</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">18</span>
                        <span class="stat-label">Categorias</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">2.4k</span>
                        <span class="stat-label">Associados</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">R$85k</span>
                        <span class="stat-label">Economia gerada</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories Filter -->
        <section class="categories-section">
            <div class="categories-container">
                <button class="category-chip active" data-category="all">Todos</button>
                <button class="category-chip" data-category="postos"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v17"/><path d="M13 10h4a2 2 0 0 1 2 2v10"/><path d="M21 7l-2-2"/><circle cx="20" cy="5" r="1"/><path d="M7 12h4"/><path d="M7 8h4"/></svg> Postos</button>
                <button class="category-chip" data-category="lava-jato"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg> Lava-Jatos</button>
                <button class="category-chip" data-category="mecanica"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Mecânicas</button>
                <button class="category-chip" data-category="estetica"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg> Estética</button>
                <button class="category-chip" data-category="pneus"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg> Pneus</button>
                <button class="category-chip" data-category="eletrica"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg> Auto Elétricas</button>
                <button class="category-chip" data-category="borracharia"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Borracharias</button>
                <button class="category-chip" data-category="guincho"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg> Guincho</button>
                <button class="category-chip" data-category="alimentacao"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg> Alimentação</button>
                <button class="category-chip" data-category="saude"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg> Saúde</button>
                <button class="category-chip" data-category="educacao"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Educação</button>
            </div>
        </section>

        <!-- Marketplace Grid -->
        <section class="marketplace-section">
            <div class="marketplace-container">
                <div class="marketplace-header">
                    <h2 class="section-title">Parceiros disponíveis</h2>
                    <div class="sort-options">
                        <select class="sort-select">
                            <option>Mais próximos</option>
                            <option>Maior desconto</option>
                            <option>Mais pontos</option>
                            <option>Melhor avaliação</option>
                        </select>
                    </div>
                </div>
                <div class="partners-grid" id="partnersGrid">
                    <!-- Cards serão inseridos via JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Detalhe do Parceiro -->
    <div class="partner-modal-overlay" id="partnerModal" style="display:none;">
        <div class="partner-modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-content" id="modalContent">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
